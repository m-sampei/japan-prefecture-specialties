services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prefecture-specialties-app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm ci --include=dev && npm install @rollup/rollup-linux-x64-musl --no-save && npm run dev -- --host 0.0.0.0 --port 5173"
